name: Zenzic VS Code CI

on:
  push:
    branches: [ main, "release/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  verify:
    name: Verify & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup uv (for REUSE compliance tool)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install REUSE
        run: uv tool install reuse

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Quality Gates
        run: just verify

      - name: Test VSIX Packaging
        run: npx @vscode/vsce package

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenzic-vscode-extension
          path: "*.vsix"
          retention-days: 7
